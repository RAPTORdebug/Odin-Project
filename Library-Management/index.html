<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Library</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header">
    <h1>My Library</h1>
    <button id="add-btn">+</button>
  </div>

  <div class="library-container-wrapper">
    <div class="library-container" id="library">
      <!-- Book cards here -->
      <div class="book-card">
        <h3>The Hobbit</h3>
        <p>Author: J.R.R. Tolkien</p>
        <p>Price: Rs.2000</p>
        <div class="btn-group">
          <button class="readbtn">Not Read</button>
          <button class="remove">Remove</button>
        </div>
      </div>
      <div class="book-card">
        <h3>1984</h3>
        <p>Author: George Orwell</p>
        <p>Price: Rs.3000</p>
        <div class="btn-group">
          <button class="readbtn">Not Read</button>
          <button class="remove">Remove</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="BookDialog" class="modal">
    <div class="modal-content">
      <h2>Add Book</h2>
      <form id="book-form">
        <label for="name">Book Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="author">Book Author:</label>
        <input type="text" id="author" name="author" required>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" required>

        <div class="btn-group">
          <button type="submit">Add</button>
          <button type="button" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; Sihath Sethmika. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
