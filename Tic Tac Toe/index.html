<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="flex">
    <div>
      <!-- Scoreboard -->
      <div class="scoreboard">
        <div>Player 1 Wins: <span id="player1-wins">0</span></div>
        <div>Player 2 Wins: <span id="player2-wins">0</span></div>
      </div>

      <!-- Round info above grid -->
      <div id="round-info">Round 1 of 3</div>

      <!-- Grid -->
      <div class="grid" id="board">
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
        <div class="card"><div class="card-face"></div></div>
      </div>

      <!-- Reset button below grid -->
      <div class="reset-container">
        <button id="reset-round">Reset</button>
      </div>

      <!-- Final result -->
      <div id="final-result"></div>
    </div>
  </div>
  <!-- Copyright Bar -->
  <div class="copyright-bar">
    &copy; Sihath Sethmika. All rights reserved.
  </div>
  
  <script src="script.js"></script>
</body>
</html>
